version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: allure_erp_db
    restart: always
    environment:
      POSTGRES_USER: allure_user
      POSTGRES_PASSWORD: allure_pass
      POSTGRES_DB: allure_erp
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: allure_erp_redis
    restart: always
    ports:
      - "127.0.0.1:6379:6379"

  backend-blue:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: allure_erp_backend_blue
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://allure_user:allure_pass@db:5432/allure_erp
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=allure_living_super_secret_key_123456789
      - OLLAMA_URL=http://ollama:11434
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/erp-webhook
      - LANGFLOW_API_URL=http://langflow:7860/api/v1/run
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - erp_uploads:/app/uploads
      - erp_backups:/app/backups
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  backend-green:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: allure_erp_backend_green
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://allure_user:allure_pass@db:5432/allure_erp
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=allure_living_super_secret_key_123456789
      - OLLAMA_URL=http://ollama:11434
      - N8N_WEBHOOK_URL=http://n8n:5678/webhook/erp-webhook
      - LANGFLOW_API_URL=http://langflow:7860/api/v1/run
    ports:
      - "127.0.0.1:8002:8000"
    volumes:
      - erp_uploads:/app/uploads
      - erp_backups:/app/backups
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  frontend-blue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allure_erp_frontend_blue
    restart: always
    depends_on:
      - backend-blue
      - backend-green
    environment:
      - NEXT_PUBLIC_API_URL=
      - BACKEND_API_URL=http://nginx/api
    ports:
      - "127.0.0.1:3001:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s

  frontend-green:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allure_erp_frontend_green
    restart: always
    depends_on:
      - backend-blue
      - backend-green
    environment:
      - NEXT_PUBLIC_API_URL=
      - BACKEND_API_URL=http://nginx/api
    ports:
      - "127.0.0.1:3002:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: allure_erp_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend-blue
      - frontend-green
      - backend-blue
      - backend-green

  langflow:
    image: langflowai/langflow:latest
    container_name: allure_erp_langflow
    restart: always
    ports:
      - "127.0.0.1:7860:7860"
    environment:
      - LANGFLOW_DATABASE_URL=sqlite:////app/langflow.db
      - LANGFLOW_REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    volumes:
      - langflow_data:/app

  ollama:
    image: ollama/ollama:latest
    container_name: allure_erp_ollama
    restart: always
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  n8n:
    image: n8nio/n8n:latest
    container_name: allure_erp_n8n
    restart: always
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=n8n
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=allure_erp
      - DB_POSTGRESDB_USER=allure_user
      - DB_POSTGRESDB_PASSWORD=allure_pass
    depends_on:
      - db
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  erp_uploads:
  erp_backups:
  langflow_data:
  ollama_data:
  n8n_data:

