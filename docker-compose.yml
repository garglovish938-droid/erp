version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: allure_erp_db
    restart: always
    environment:
      POSTGRES_USER: allure_user
      POSTGRES_PASSWORD: allure_pass
      POSTGRES_DB: allure_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: allure_erp_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: allure_erp_backend
    restart: always
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://allure_user:allure_pass@db:5432/allure_erp
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=allure_living_super_secret_key_123456789
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allure_erp_frontend
    restart: always
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost/api
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: allure_erp_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
